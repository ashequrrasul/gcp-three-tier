# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push request events but only for the "main" branch
  push:
    branches: [ "main" ]
  
env:
  PROJECT_ID: project-40d105bf-bb2b-4bf6-b9f
  REGION: us-east5
  CLUSTER_NAME: gke-three-tier
  CLUSTER_ZONE: us-east5-a
  REPOSITORY: gcp-three-tier
  NAMESPACE: three-tier

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
      
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:${{ github.sha }}
          docker build -t $BACKEND_IMAGE ./backend
          docker push $BACKEND_IMAGE
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV
      
      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:${{ github.sha }}
          docker build -t $FRONTEND_IMAGE ./frontend
          docker push $FRONTEND_IMAGE
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER_NAME \
            --zone $CLUSTER_ZONE \
            --project $PROJECT_ID

      - name: Deploy Kubernetes manifests
        run: |
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/secretproviderclass.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/pdb.yaml
          kubectl apply -f k8s/networkpolicy.yaml
          kubectl apply -f k8s/ingress.yaml
      
      - name: Update backend image
        run: |
          kubectl set image deployment/backend backend=$BACKEND_IMAGE -n $NAMESPACE

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend frontend=$FRONTEND_IMAGE -n $NAMESPACE

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/backend -n $NAMESPACE --timeout=180s
          kubectl rollout status deployment/frontend -n $NAMESPACE --timeout=180s
          kubectl get pods -n $NAMESPACE
          kubectl get ingress -n $NAMESPACE

